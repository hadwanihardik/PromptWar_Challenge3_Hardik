<!doctype html>
<html>
<head><title>Debug Test</title></head>
<body>
<h1>Module Loading Debug</h1>
<pre id="log"></pre>
<script type="module">
  const log = (msg) => {
    document.getElementById('log').textContent += msg + '\n';
    console.log(msg);
  };

  try {
    log('1. Testing i18n.js import...');
    const { t, initLanguage } = await import('./assets/js/i18n.js');
    log('   ✅ i18n.js loaded. t("appName") = ' + t('appName'));
  } catch(e) {
    log('   ❌ i18n.js FAILED: ' + e.message);
  }

  try {
    log('2. Testing storage.js import...');
    const { loadState } = await import('./assets/js/storage.js');
    const state = loadState();
    log('   ✅ storage.js loaded. State has footprint: ' + !!state.footprint);
  } catch(e) {
    log('   ❌ storage.js FAILED: ' + e.message);
  }

  try {
    log('3. Testing challenges.js import...');
    const { getAvailableChallenges } = await import('./assets/js/challenges.js');
    const challenges = getAvailableChallenges();
    log('   ✅ challenges.js loaded. Available challenges: ' + challenges.length);
  } catch(e) {
    log('   ❌ challenges.js FAILED: ' + e.message);
  }

  try {
    log('4. Testing maps.js import...');
    const { getAllEcoMapLinks } = await import('./assets/js/maps.js');
    const links = getAllEcoMapLinks();
    log('   ✅ maps.js loaded. Map links: ' + links.length);
  } catch(e) {
    log('   ❌ maps.js FAILED: ' + e.message);
  }

  try {
    log('5. Testing calendar.js import...');
    const { getAllCalendarReminders } = await import('./assets/js/calendar.js');
    const reminders = getAllCalendarReminders();
    log('   ✅ calendar.js loaded. Reminders: ' + reminders.length);
  } catch(e) {
    log('   ❌ calendar.js FAILED: ' + e.message);
  }

  try {
    log('6. Testing calculator.js import...');
    const { calculateTotal } = await import('./assets/js/calculator.js');
    const result = calculateTotal();
    log('   ✅ calculator.js loaded. Monthly total: ' + result.monthlyTotal);
  } catch(e) {
    log('   ❌ calculator.js FAILED: ' + e.message);
  }

  try {
    log('7. Testing dashboard.js import...');
    const { renderDashboard } = await import('./assets/js/dashboard.js');
    log('   ✅ dashboard.js loaded.');
  } catch(e) {
    log('   ❌ dashboard.js FAILED: ' + e.message);
  }

  try {
    log('8. Testing recommendations.js import...');
    const { getTopRecommendations } = await import('./assets/js/recommendations.js');
    log('   ✅ recommendations.js loaded.');
  } catch(e) {
    log('   ❌ recommendations.js FAILED: ' + e.message);
  }

  try {
    log('9. Testing gemini.js import...');
    const { setApiKey, hasApiKey } = await import('./assets/js/gemini.js');
    log('   ✅ gemini.js loaded. Has API key: ' + hasApiKey());
  } catch(e) {
    log('   ❌ gemini.js FAILED: ' + e.message);
  }

  try {
    log('10. Testing assistant.js import...');
    const { initAssistant } = await import('./assets/js/assistant.js');
    log('   ✅ assistant.js loaded.');
  } catch(e) {
    log('   ❌ assistant.js FAILED: ' + e.message);
  }

  try {
    log('\n11. Testing app.js import (the main entry)...');
    await import('./assets/js/app.js');
    log('   ✅ app.js loaded and executed.');
  } catch(e) {
    log('   ❌ app.js FAILED: ' + e.message);
    log('   Stack: ' + e.stack);
  }

  // Check DOM containers
  log('\n=== DOM CONTAINER CHECK ===');
  ['challenges-container', 'maps-container', 'calendar-container', 'dashboard-container', 'recommendations-container', 'assistant-chat'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      log(`  ${id}: innerHTML length = ${el.innerHTML.trim().length}, children = ${el.children.length}`);
    } else {
      log(`  ${id}: ❌ NOT FOUND IN DOM`);
    }
  });
</script>
</body>
</html>
